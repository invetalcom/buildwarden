name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  validate:
    name: Typecheck, lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
